body = "A former Quantity Surveyor, Mr. Kalansuriya transitioned into his father’s business, applying professional precision to modernize operations. Under his visionary leadership, the company has grown into a thriving enterprise and a cornerstone of Galle's economy. Today, he is a prominent businessman, driving the firm’s continued success and reliability. "

